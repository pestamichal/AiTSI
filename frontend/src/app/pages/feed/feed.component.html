
<app-header></app-header>
<main class="main-content">
    <div
        class="filter-drawer-backdrop"
        [class.filter-drawer-backdrop--open]="filterDrawerOpen"
        (click)="closeFilterDrawer()"
        aria-hidden="true"
    ></div>

    <div
        id="filter-tab"
        class="filter-sidebar"
        [class.filter-sidebar--open]="filterDrawerOpen"
    >
        <button
            type="button"
            class="filter-drawer-close"
            aria-label="Zamknij menu regionów"
            (click)="closeFilterDrawer()"
        >
            <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
        <app-filter-tab class="filter-sidebar__tab"></app-filter-tab>
    </div>

    <div id="main-panel">
        <div class="mobile-drawer-toolbar">
            <button
                type="button"
                class="filter-drawer-open"
                (click)="openFilterDrawer()"
                [attr.aria-expanded]="filterDrawerOpen"
                aria-controls="filter-tab"
            >
                <i class="bi bi-geo-alt" aria-hidden="true"></i>
                <span>Wybór regionu</span>
            </button>
            <button
                type="button"
                class="user-drawer-open"
                (click)="openUserDrawer()"
                [attr.aria-expanded]="userDrawerOpen"
                aria-controls="user-panel"
            >
                <i class="bi bi-person-circle" aria-hidden="true"></i>
                <span>Menu</span>
            </button>
        </div>
        <app-search-bar></app-search-bar>
        <div class="photo-list-scroll">
            <app-photo-list></app-photo-list>
        </div>
    </div>
    <div
        class="user-drawer-backdrop"
        [class.user-drawer-backdrop--open]="userDrawerOpen"
        (click)="closeUserDrawer()"
        aria-hidden="true"
    ></div>

    <div
        id="user-panel"
        class="user-sidebar"
        [class.user-sidebar--open]="userDrawerOpen"
    >
        <button
            type="button"
            class="user-drawer-close"
            aria-label="Zamknij menu użytkownika"
            (click)="closeUserDrawer()"
        >
            <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
        <app-user-panel class="user-sidebar__panel"></app-user-panel>
    </div>
</main>
